name: build

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build:
    name: Build dinput8.dll (x86)
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up MSVC environment (x86)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Build
        shell: cmd
        run: call build.bat

      - name: Verify DLL (32-bit, exports intact)
        shell: cmd
        run: |
          dumpbin /nologo /headers build\dinput8.dll | findstr /C:"machine (x86)" >nul || (echo [ERROR] dinput8.dll is not a 32-bit x86 image & exit /b 1)
          echo [OK] 32-bit x86 PE
          dumpbin /nologo /exports build\dinput8.dll > exports.txt
          type exports.txt
          for %%E in (DirectInput8Create DllCanUnloadNow DllGetClassObject DllRegisterServer DllUnregisterServer GetdfDIJoystick) do (
              findstr /C:"%%E" exports.txt >nul || (echo [ERROR] missing export: %%E & exit /b 1)
          )
          echo [OK] all 6 exports present

      - name: Compute version
        id: version
        shell: pwsh
        run: |
          $ver = 'dev-' + $env:GITHUB_SHA.Substring(0, 7)
          if ($env:GITHUB_REF -like 'refs/tags/v*') { $ver = $env:GITHUB_REF_NAME }
          "version=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "version: $ver"

      - name: Package
        shell: pwsh
        run: |
          $ver = '${{ steps.version.outputs.version }}'
          $zip = "guild2-cursor-lag-fix-$ver.zip"
          New-Item -ItemType Directory dist | Out-Null
          Copy-Item build\dinput8.dll dist\
          @(
            "The Guild 2: Renaissance - mouse cursor lag fix ($ver)"
            "https://github.com/${{ github.repository }}"
            ""
            "Install:   copy dinput8.dll next to GuildII.exe in the game folder, then launch the game."
            "Uninstall: delete that dinput8.dll."
          ) | Set-Content dist\INSTALL.txt -Encoding ascii
          Compress-Archive -Path dist\* -DestinationPath $zip
          $sums = foreach ($f in @($zip, 'dist\dinput8.dll')) {
            "{0}  {1}" -f (Get-FileHash $f -Algorithm SHA256).Hash.ToLower(), (Split-Path $f -Leaf)
          }
          $sums | Set-Content SHA256SUMS.txt -Encoding ascii
          Get-Content SHA256SUMS.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: guild2-cursor-lag-fix-${{ steps.version.outputs.version }}
          path: |
            dist/
            SHA256SUMS.txt
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            Proxy `dinput8.dll` that fixes the mouse-move FPS drop in **The Guild 2: Renaissance**.

            ### Install
            1. Download `dinput8.dll` (or the zip) below.
            2. Put it next to `GuildII.exe` in the game folder.
            3. Launch the game. To uninstall, just delete the file.

            Built automatically from this tag with MSVC (x86, `/O2 /MT`). Checksums: `SHA256SUMS.txt`.
          files: |
            guild2-cursor-lag-fix-${{ github.ref_name }}.zip
            dist/dinput8.dll
            SHA256SUMS.txt
          fail_on_unmatched_files: true
